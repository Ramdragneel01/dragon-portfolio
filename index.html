      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Sora", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
    }

    .app-loader {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-surface) 100%);
    }

    .app-loader__panel {
      width: min(440px, 92vw);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      border-radius: 14px;
      box-shadow: var(--shadow-elev-1);
      padding: 20px;
    }

    .app-loader__title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .app-loader__subtitle {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin-bottom: 14px;
    }

    .app-loader__bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--color-loader-track);
      border: 1px solid var(--color-border);
    }

    .app-loader__fill {
      width: 40%;
      height: 100%;
      background: var(--color-loader-fill);
      border-radius: inherit;
      animation: loader-slide 1.15s ease-in-out infinite;
      transform-origin: left center;
    }

    @keyframes loader-slide {
      0% {
        transform: translateX(-65%);
      }

      50% {
        transform: translateX(110%);
      }

      100% {
        transform: translateX(-65%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-loader__fill {
        animation: none;
      }
    }
